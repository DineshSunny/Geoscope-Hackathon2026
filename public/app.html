<!DOCTYPE html>
<html>
<head>
  <title>Geoscope App</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <!-- 🎥 BACKGROUND VIDEO -->
  <video autoplay muted loop id="bg-video">
    <source src="/videos/globe.mp4" type="video/mp4">
  </video>

  <!-- MAIN CONTENT -->
  <div class="container">
    <h1 id="welcome">Loading...</h1>
    <p class="subtitle">Access Granted</p>

    <button id="logoutBtn">Logout</button>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHBuDVBkzxDjT1A1LUpmj6sGumu3VYI6w",
      authDomain: "geoscope-4d307.firebaseapp.com",
      projectId: "geoscope-4d307",
      appId: "1:339709550664:web:f82c7fb2a03f3e5c88787d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🔐 Get user
    const user = JSON.parse(localStorage.getItem("user"));

    // 🚫 Protect page
    if (!user) {
      window.location.href = "/login.html";
    } else {
      document.getElementById("welcome").innerText =
        "Welcome, " + user.name;
    }

    // 🔓 FULL LOGOUT (Firebase + local)
    document.getElementById("logoutBtn").onclick = async () => {
      await signOut(auth); // 🔥 THIS FIXES YOUR ISSUE
      localStorage.removeItem("user");
      window.location.href = "/index.html";
    };
  </script>

</body>
</html>
