<!DOCTYPE html>
<html>
<head>
  <title>Geoscope App</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <!-- 🎥 BACKGROUND VIDEO -->
  <video autoplay muted loop id="bg-video">
    <source src="/videos/globe.mp4" type="video/mp4">
  </video>

  <!-- MAIN CONTENT -->
  <div class="container">
    <h1 id="welcome">Loading...</h1>
    <p class="subtitle">Access Granted</p>

    <div class="button-group">
      <button id="openMapBtn">Open Map Viewer</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHBuDVBkzxDjT1A1LUpmj6sGumu3VYI6w",
      authDomain: "geoscope-4d307.firebaseapp.com",
      projectId: "geoscope-4d307",
      appId: "1:339709550664:web:f82c7fb2a03f3e5c88787d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🔐 Get user safely
    const userData = localStorage.getItem("user");

    if (!userData) {
      window.location.href = "/login.html";
    } else {
      const user = JSON.parse(userData);

      // 👋 Show welcome
      document.getElementById("welcome").innerText =
        "Welcome, " + (user.name || "User");
    }

    // 🔓 Logout (FULL RESET)
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        await signOut(auth); // Firebase logout
      } catch (e) {
        console.log("Firebase signOut skipped");
      }

      localStorage.removeItem("user"); // local logout
      window.location.href = "/index.html";
    });

    // 🌍 Open Map Viewer (points directly to geoscope.html)
    document.getElementById("openMapBtn").addEventListener("click", () => {
      window.location.href = "/geoscope.html";
    });
  </script>

</body>
</html>
